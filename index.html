<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Resolve o problema do título cortado removendo margens do navegador */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: transparent;
            font-family: sans-serif;
        }

        #harpia-window {
            display: none; /* Inicia fechado */
            width: calc(100% - 20px);
            height: calc(100% - 80px);
            max-width: 330px;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 15px;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            overflow: hidden;
            position: absolute;
            bottom: 80px;
            right: 10px;
        }

        #harpia-header {
            background: #000;
            color: #fff;
            padding: 15px;
            font-weight: bold;
            text-align: center;
            flex-shrink: 0; /* Impede o título de ser esmagado */
        }

        #harpia-msgs {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            background: #f9f9f9;
            display: flex;
            flex-direction: column;
            gap: 10px;
            color: #333;
        }

        #harpia-input-area {
            display: flex;
            padding: 10px;
            border-top: 1px solid #eee;
            background: #fff;
        }

        #harpia-input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
            outline: none;
        }

        #harpia-send {
            background: #000;
            color: #fff;
            border: none;
            margin-left: 5px;
            padding: 0 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        #harpia-btn {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            font-size: 30px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 100;
        }

        .msg-user { background: #007bff; color: #fff; padding: 10px; border-radius: 10px; align-self: flex-end; font-size: 14px; max-width: 80%; }
        .msg-bot { background: #eee; padding: 10px; border-radius: 10px; align-self: flex-start; font-size: 14px; max-width: 80%; }
    </style>
</head>
<body>

    <div id="harpia-window">
        <div id="harpia-header">🦅 CÓDIGO HARPIA AI</div>
        <div id="harpia-msgs">
            <div class="msg-bot">Olá! Como posso ajudar sua empresa hoje?</div>
        </div>
        <div id="harpia-input-area">
            <input type="text" id="harpia-input" placeholder="Digite sua dúvida...">
            <button id="harpia-send">➤</button>
        </div>
    </div>
    
    <button id="harpia-btn">💬</button>

    <script>
        const btn = document.getElementById('harpia-btn');
        const win = document.getElementById('harpia-window');
        const input = document.getElementById('harpia-input');
        const send = document.getElementById('harpia-send');
        const msgs = document.getElementById('harpia-msgs');

        const API_URL = "https://porjetoharpia.onrender.com/chat";

        btn.onclick = () => {
            win.style.display = win.style.display === 'none' ? 'flex' : 'none';
        };

        async function enviarMsg() {
            const text = input.value.trim();
            if (!text) return;

            msgs.innerHTML += `<div class="msg-user">${text}</div>`;
            input.value = '';
            msgs.scrollTop = msgs.scrollHeight;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await response.json();
                msgs.innerHTML += `<div class="msg-bot">${data.resposta}</div>`;
            } catch (e) {
                msgs.innerHTML += `<div class="msg-bot" style="background:#ffcccc">Erro ao conectar com a IA.</div>`;
            }
            msgs.scrollTop = msgs.scrollHeight;
        }

        send.onclick = enviarMsg;
        input.onkeydown = (e) => { if(e.key === 'Enter') enviarMsg(); };
    </script>
</body>
</html>
