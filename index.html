<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        /* Mantendo seu CSS original */
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: transparent; font-family: sans-serif; 
        }
        #harpia-window {
            display: none; flex-direction: column;
            width: 320px; height: 450px; 
            background: #fff; border: 1px solid #000; border-radius: 15px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            position: absolute; bottom: 85px; right: 10px;
        }
        #harpia-header {
            background: #000; color: #fff; padding: 12px;
            font-weight: bold; text-align: center; border-radius: 14px 14px 0 0;
        }
        #harpia-msgs {
            flex: 1; padding: 15px; overflow-y: auto; background: #fdfdfd;
            display: flex; flex-direction: column; gap: 8px;
        }
        #input-area { display: flex; padding: 10px; border-top: 1px solid #eee; }
        #harpia-input { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 5px; outline: none; }
        #harpia-btn {
            position: absolute; bottom: 15px; right: 15px;
            background: #000; color: #fff; border: none; border-radius: 50%;
            width: 60px; height: 60px; font-size: 30px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        .msg-user { background: #007bff; color: #fff; padding: 8px 12px; border-radius: 10px; align-self: flex-end; max-width: 85%; font-size: 14px; }
        .msg-bot { background: #f0f0f0; color: #000; padding: 8px 12px; border-radius: 10px; align-self: flex-start; max-width: 85%; font-size: 14px; white-space: pre-wrap; overflow-wrap: break-word; /* Garante que palavras longas não cortem */}
    </style>
</head>
<body>
    <div id="harpia-window">
        <div id="harpia-header">🦅 CÓDIGO HARPIA AI</div>
        <div id="harpia-msgs"><div class="msg-bot">Olá! Como posso ajudar sua empresa hoje?</div></div>
        <div id="input-area">
            <input type="text" id="harpia-input" placeholder="Digite sua dúvida...">
        </div>
    </div>
    <button id="harpia-btn">💬</button>

    <script>
        const btn = document.getElementById('harpia-btn');
        const win = document.getElementById('harpia-window');
        const inp = document.getElementById('harpia-input');
        const box = document.getElementById('harpia-msgs');
        const API = "https://porjetoharpia.onrender.com/chat";

        let chatHistory = [];

        btn.onclick = () => win.style.display = win.style.display === 'none' ? 'flex' : 'none';

        inp.onkeydown = async (e) => {
            if (e.key === 'Enter' && inp.value.trim()) {
                const text = inp.value;
                box.innerHTML += `<div class="msg-user">${text}</div>`;
                inp.value = '';
                
                // 1. ADICIONA INDICADOR DE CARREGAMENTO
                const loadingDiv = document.createElement('div');
                loadingDiv.className = 'msg-bot';
                loadingDiv.id = 'loading-harpia';
                loadingDiv.innerText = '🦅 Analisando seu cenário...';
                box.appendChild(loadingDiv);
                box.scrollTop = box.scrollHeight;

                try {
                    const r = await fetch(API, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            message: text,
                            history: chatHistory
                        })
                    });

                    const d = await r.json();
                    
                    // 2. REMOVE O INDICADOR E EXIBE A RESPOSTA
                    const loader = document.getElementById('loading-harpia');
                    if (loader) loader.remove();

                    const botReply = d.resposta;
                    chatHistory.push({ role: "user", content: text });
                    chatHistory.push({ role: "model", content: botReply });

                    if (chatHistory.length > 20) chatHistory = chatHistory.slice(-20);
                    box.innerHTML += `<div class="msg-bot">${botReply}</div>`;
                } catch(err) {
                    const loader = document.getElementById('loading-harpia');
                    if (loader) loader.remove();
                    box.innerHTML += `<div class="msg-bot" style="color:red">Erro de conexão.</div>`;
                }
                box.scrollTop = box.scrollHeight;
            }
        };
    </script>
</body>
</html>
